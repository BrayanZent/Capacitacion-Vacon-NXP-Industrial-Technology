{
  id:'programacion', title:'Programación avanzada y entorno NCDrive', short:'NCDrive / Menús',
  eyebrow:'Módulo 05 · Software', sub:'Árbol de menús M1-M7 y uso del software de soporte NCDrive.',
  content:`
    <div class="card">
      <p>El árbol de parámetros del VACON NXP se organiza en 7 menús principales (M1–M7), accesibles desde el panel de control o desde el software NCDrive en PC.</p>

      ${H3("Árbol de menús M1–M7 (según manual)")}
      <table class="tech">
        <tr><th>Menú</th><th>Contenido</th></tr>
        <tr><td>M1</td><td>Monitor — valores en tiempo real: frecuencia de salida, referencia, velocidad, corriente, torque, potencia, tensión de motor, tensión de bus CC, temperatura, entradas/salidas</td></tr>
        <tr><td>M2</td><td>Parámetros — grupos de la aplicación activa (ej. G2.1 Básicos, G2.2 Señales de entrada, G2.6 Control de motor, G2.7 Protecciones, G2.9 Fieldbus)</td></tr>
        <tr><td>M3</td><td>Control de panel — lugar de control, referencia y dirección desde panel</td></tr>
        <tr><td>M4</td><td>Fallas activas</td></tr>
        <tr><td>M5</td><td>Historial de fallas</td></tr>
        <tr><td>M6</td><td>Menú de sistema — idioma, selección de aplicación, transferencia/comparación de parámetros, seguridad (incl. Start-up Wizard), ajustes de panel, configuración de hardware, información del sistema</td></tr>
        <tr><td>M7</td><td>Tarjetas de expansión instaladas (muestra las opciones detectadas en los slots A-E)</td></tr>
      </table>
      ${INFO("Navegación práctica: M1 y M4/M5 son los menús de uso más frecuente en terreno para diagnóstico rápido — M1 muestra qué está haciendo el variador ahora mismo y M5 qué pasó en la última falla. M2 y M6 se usan principalmente durante la puesta en marcha o al modificar la aplicación de control.")}

      ${H3("NCDrive (software de soporte PC)")}
      <ul>
        <li>Permite parametrizar el variador asignando funciones a entradas/salidas desde una interfaz gráfica en PC, replicando la misma lógica de programación disponible en el panel.</li>
        <li>La Status Word de aplicaciones no multipropósito solo puede leerse mediante NCDrive.</li>
        <li>Configuración de intercambio vía archivo <code>NCDrive.ini</code> (sección [Misc]).</li>
        <li>Conexión típica: cable de programación PC–variador (puerto del panel o adaptador de comunicación), permitiendo ver y modificar parámetros sin desmontar el panel físico.</li>
      </ul>
      ${NOTE("Los procedimientos detallados de carga/descarga completa de aplicaciones de control y el uso del osciloscopio digital en tiempo real no están descritos en los manuales de hardware revisados — corresponden al manual dedicado de NCDrive (no incluido en el espacio de trabajo actual). No inventar pasos de este flujo; remitirse al manual de NCDrive antes de ejecutarlo en un equipo productivo.")}
    </div>

    <div class="card">
      ${H3("Panel de control — indicadores de estado (capacitación interna Vacon NXP)")}
      <p>El panel de control Vacon NX incluye una pantalla alfanumérica con indicadores dedicados de estado, lugar de control y 3 LEDs, además de nueve pulsadores para operar el equipo, ajustar parámetros y monitorizar valores. El panel es extraíble y está aislado del potencial de red.</p>
      <table class="tech">
        <tr><th>#</th><th>Indicador</th><th>Significado</th></tr>
        <tr><td>1</td><td>MARCHA (RUN)</td><td>El motor está en marcha</td></tr>
        <tr><td>2</td><td>Dirección de rotación</td><td>Indica el sentido de giro del motor</td></tr>
        <tr><td>3</td><td>PARO (STOP)</td><td>La unidad no está en marcha</td></tr>
        <tr><td>4</td><td>LISTO (READY)</td><td>Se ilumina cuando hay tensión de CA presente</td></tr>
        <tr><td>5</td><td>ALARMA (ALARM)</td><td>El variador opera fuera de límites normales</td></tr>
        <tr><td>6</td><td>FALLO (FAULT)</td><td>Condiciones inseguras; el variador se detiene</td></tr>
      </table>
      <table class="tech">
        <tr><th>Lugar de control</th><th>Significado</th></tr>
        <tr><td>a</td><td>Terminales de E/S (I/O term)</td></tr>
        <tr><td>b</td><td>Panel de control (Keypad)</td></tr>
        <tr><td>c</td><td>Bus de campo / comunicación (Bus/Comm)</td></tr>
      </table>
      <table class="tech">
        <tr><th>LED</th><th>Color</th><th>Significado</th></tr>
        <tr><td>I</td><td>Verde</td><td>Listo (Ready)</td></tr>
        <tr><td>II</td><td>Verde</td><td>En marcha (Run)</td></tr>
        <tr><td>III</td><td>Rojo</td><td>Fallo (Fault)</td></tr>
      </table>
      ${INFO("El material fuente resume estos indicadores como \"siete\" en su diapositiva introductoria, pero el detalle ilustrado (usado en esta tabla) enumera 6 indicadores de estado numerados de forma inequívoca — se transcribe aquí el detalle verificado en la imagen, no el resumen textual.")}
      ${IMG("panel-control-indicadores.png", "Panel de control Vacon NX — indicadores de estado, lugar de control y LEDs", "Vacon NXP.pdf (capacitación interna), \"Panel de control\"")}
    </div>
  `,
  quiz:[
    { q:"¿Qué menú del árbol de parámetros contiene el historial de fallas?", options:["M2","M4","M5","M7"], answer:2, explain:"M5 es el menú de historial de fallas; M4 muestra las fallas activas." },
    { q:"¿Qué información se encuentra en el menú M1 (Monitor)?", options:["Historial de fallas","Valores en tiempo real como frecuencia, corriente y torque","Tarjetas de expansión instaladas","Configuración de idioma"], answer:1, explain:"M1 (Monitor) despliega los valores en tiempo real del variador: frecuencia, corriente, torque, tensiones y más." },
    { q:"¿Dónde se ubica el Start-up Wizard dentro del árbol de menús?", options:["M1","M3","M6 (Menú de sistema)","M7"], answer:2, explain:"El Start-up Wizard vive dentro de M6, el Menú de sistema, junto con idioma, selección de aplicación y seguridad." },
    { q:"¿Qué permite leer NCDrive que no siempre está disponible desde el panel de control?", options:["El historial de fallas","La Status Word de aplicaciones no multipropósito","El código de falla activo","La temperatura ambiente"], answer:1, explain:"La Status Word de aplicaciones no multipropósito solo puede leerse mediante NCDrive, no desde el panel." },
    { q:"Según la documentación disponible, ¿están detallados el osciloscopio en tiempo real y el upload/download completo de aplicaciones vía NCDrive en los manuales de hardware?", options:["Sí, con procedimiento paso a paso","No, no están descritos en los manuales de hardware revisados","Solo para NXS, no NXP","Solo mediante Profibus"], answer:1, explain:"Esos procedimientos corresponden al manual dedicado de NCDrive, no incluido entre los manuales de hardware revisados." }
  ]
},

{
  id:'puesta', title:'Puesta en servicio y optimización dinámica (ID Run)', short:'Puesta en marcha',
  eyebrow:'Módulo 06 · Comisionamiento', sub:'Checklist de arranque, parámetros de placa de motor, ID Run y sintonía del lazo de velocidad.',
  content:`
    <div class="card">
      <p>La puesta en marcha del VACON NXP sigue un checklist estructurado antes de habilitar el control del motor, culminando en una identificación automática (ID Run) que ajusta el modelo interno del motor para un control preciso.</p>

      ${H3("Checklist de arranque (resumen, según manual)")}
      <ol>
        <li>Verificación de entrega del equipo</li>
        <li>Revisión del capítulo de seguridad (ver módulo de Seguridad)</li>
        <li>Verificar despejes mecánicos y condiciones ambientales</li>
        <li>Dimensionamiento de cables y fusibles</li>
        <li>Instalación de cableado de potencia</li>
        <li>Cableado de terminales de control (ver módulo de Tarjetas de control, tabla OPTA1)</li>
        <li>Wizard / Menú M6: idioma y selección de aplicación</li>
        <li>Verificar parámetros de placa de motor en G2.1 contra la placa física</li>
        <li>Seguir procedimiento de arranque del capítulo 8 del manual</li>
        <li>Equipo listo para operar</li>
      </ol>

      ${H3("Parámetros de placa de motor (según manual)")}
      <table class="tech">
        <tr><th>ID</th><th>Parámetro</th></tr>
        <tr><td>ID110 (P2.1.6)</td><td>Tensión nominal</td></tr>
        <tr><td>ID111 (P2.1.7)</td><td>Frecuencia nominal</td></tr>
        <tr><td>ID112 (P2.1.8)</td><td>Velocidad nominal</td></tr>
        <tr><td>ID113 (P2.1.9)</td><td>Corriente nominal</td></tr>
        <tr><td>ID120 (P2.1.10)</td><td>Cos φ</td></tr>
      </table>
      ${INFO("Estos cinco valores deben transcribirse exactamente desde la placa física del motor antes de cualquier ID Run — un dato incorrecto (ej. tensión nominal mal digitada) produce un modelo de motor erróneo y puede derivar en sobrecorriente, torque insuficiente o inestabilidad del lazo de velocidad.")}

      ${H3("Identificación del motor (ID Run) — parámetro ID631, según manual")}
      <ul>
        <li><strong>1 = Test Estático:</strong> el variador energiza el motor a frecuencia cero, mide corriente/tensión e identifica la relación U/f sin girar el eje. Es la opción más segura cuando el motor no puede desacoplarse de la carga.</li>
        <li><strong>2 = Test con Giro (solo NXP):</strong> el variador hace girar el motor a velocidad real para identificar U/f y corriente de magnetización con mayor precisión — requiere eje sin carga mecánica acoplada para no dañar el proceso ni obtener una identificación distorsionada.</li>
        <li>3 = ID Run de encoder (posición cero para motor PMS con encoder absoluto).</li>
        <li>El comando de marcha debe darse dentro de 20 s de fijar el parámetro o el ID Run se reinicia.</li>
      </ul>

      ${H3("Sintonía del lazo de velocidad en control vectorial de flujo")}
      <p>En modo de lazo cerrado (control vectorial de flujo), el variador regula la velocidad comparando la referencia contra la velocidad real estimada, ajustando el torque entregado. Los parámetros relevantes documentados son: ganancia proporcional Kp (ID613), puntos de quiebre de ganancia adaptativa (ID1299-1301), ganancia y filtro de torque mínimo (ID1295-1297), compensación de aceleración/inercia (ID626), corriente y tiempo de magnetización de arranque (ID627/628) y filtro de error de velocidad (ID1311).</p>
      ${NOTE("Estos parámetros de sintonía (grupo G2.6.23) solo están expuestos en la Aplicación 6 (multipropósito, lazo cerrado). Modificarlos sin criterio puede generar oscilación de velocidad o sobrecorriente — ajustar de forma incremental y validar en vacío antes de cargar el eje.")}
    </div>
  `,
  quiz:[
    { q:"Antes de habilitar el control del motor, ¿qué se debe verificar en el paso 8 del checklist?", options:["Solo el idioma del panel","Los parámetros de placa de motor en G2.1 contra la placa física","El historial de fallas","El firmware instalado"], answer:1, explain:"El paso 8 exige contrastar los parámetros de G2.1 con los datos reales de la placa del motor." },
    { q:"¿Qué diferencia principal existe entre el Test Estático y el Test con Giro (ID Run)?", options:["Son idénticos","El Test con Giro hace girar el motor a velocidad real y requiere eje sin carga; el estático no gira el eje","El Test Estático solo aplica a motores PMS","El Test con Giro no mide corriente"], answer:1, explain:"El Test con Giro identifica U/f y corriente de magnetización girando el eje a velocidad real, por lo que exige que no haya carga mecánica acoplada." },
    { q:"¿Qué parámetro activa la identificación (ID Run) del motor?", options:["ID110","ID613","ID631","ID1311"], answer:2, explain:"ID631 es el parámetro que selecciona y dispara el tipo de ID Run (estático, con giro o de encoder)." },
    { q:"¿Cuánto tiempo hay para dar el comando de marcha tras fijar el parámetro de ID Run antes de que se reinicie?", options:["5 segundos","20 segundos","2 minutos","No hay límite de tiempo"], answer:1, explain:"El manual exige dar el comando de marcha dentro de los 20 segundos siguientes a fijar el parámetro, o el ID Run se reinicia." },
    { q:"¿Qué parámetro corresponde a la ganancia Kp del lazo de velocidad en control vectorial de flujo, y en qué aplicación está disponible?", options:["ID110, en cualquier aplicación","ID613, solo en la Aplicación 6 (multipropósito, lazo cerrado)","ID120, en Aplicación 1","ID631, en todas las aplicaciones"], answer:1, explain:"ID613 es la ganancia Kp del lazo de velocidad, y este grupo de sintonía solo está expuesto en la Aplicación 6 de lazo cerrado." }
  ]
},

{
  id:'diagnostico', title:'Diagnóstico y resolución de fallos en terreno', short:'Diagnóstico',
  eyebrow:'Módulo 07 · Troubleshooting', sub:'Códigos de falla F1/F2/F3/F9/F52/F54, historial T.1-T.16 y metodología de diagnóstico.',
  content:`
    <div class="card">
      ${NOTE("<strong>Corrección de códigos:</strong> el manual VACON define <strong>F9 como \"Baja tensión\"</strong>, no como falla a tierra. La falla a tierra real corresponde al código <strong>F3</strong>. Este módulo usa los códigos oficiales del manual, no los de un brief anterior.")}

      ${H3("Metodología general de diagnóstico (conocimiento de referencia)")}
      <p>Antes de reiniciar una falla, es buena práctica de terreno seguir un orden: (1) leer el código exacto en el panel o en M4/M5, (2) revisar el historial de datos congelados (T.1-T.16) para entender las condiciones en el instante de la falla, (3) clasificar la causa probable como mecánica (carga, acople), eléctrica (cableado, aislación, red) o de parametrización (límites mal configurados), y (4) verificar antes de resetear — resetear sin diagnosticar solo oculta el síntoma y puede repetir la falla bajo carga.</p>

      ${H3("Códigos de falla — causas y remedio (según manual)")}
      <table class="tech">
        <tr><th>Código</th><th>Falla</th><th>Causas típicas</th><th>Remedio</th></tr>
        <tr><td>F1</td><td>Sobrecorriente</td><td>Corriente &gt;4×I_High; aumento súbito de carga; cortocircuito en cable de motor; tipo de motor incorrecto</td><td>Revisar carga, motor, cables/conexiones; ejecutar ID Run</td></tr>
        <tr><td>F2</td><td>Sobretensión</td><td>Tiempo de deceleración muy corto; picos de tensión de red; secuencia Run/Stop muy rápida</td><td>Aumentar tiempo de deceleración; usar chopper/resistencia de frenado; activar controlador de sobretensión</td></tr>
        <tr><td>F3</td><td>Falla a tierra</td><td>Suma de corrientes de fase del motor ≠ cero — falla de aislación en cables o motor</td><td>Revisar cables de motor y motor (megado)</td></tr>
        <tr><td>F9</td><td>Baja tensión</td><td>Tensión de red baja; fusible de entrada fundido; falla interna; interruptor de carga no cerrado</td><td>Verificar tensión de red; revisar fusibles de entrada</td></tr>
        <tr><td>F52</td><td>Fallo de comunicación con panel</td><td>Conexión defectuosa entre panel de control (o NCDrive) y variador</td><td>Revisar panel y conexión de cable</td></tr>
        <tr><td>F54</td><td>Fallo de slot/ranura</td><td>Tarjeta opcional o slot defectuoso</td><td>Revisar tarjeta y slot; contactar al distribuidor</td></tr>
      </table>

      ${H3("Historial de Fallas — parámetros T.1 a T.16 (según manual)")}
      <table class="tech">
        <tr><th>Param.</th><th>Dato congelado en el momento de la falla</th></tr>
        <tr><td>T.1 / T.2</td><td>Contador de días / horas de funcionamiento</td></tr>
        <tr><td>T.3</td><td>Frecuencia de salida</td></tr>
        <tr><td>T.4</td><td>Corriente de motor</td></tr>
        <tr><td>T.5</td><td>Tensión de motor</td></tr>
        <tr><td>T.6 / T.7</td><td>Potencia (%) / Torque (%) del motor</td></tr>
        <tr><td>T.8</td><td>Tensión de bus CC</td></tr>
        <tr><td>T.9</td><td>Temperatura del variador</td></tr>
        <tr><td>T.10 / T.11</td><td>Estado de marcha / Sentido de giro</td></tr>
        <tr><td>T.12</td><td>Advertencias activas</td></tr>
        <tr><td>T.13</td><td>Bandera de velocidad cero (&lt;0.01Hz)</td></tr>
        <tr><td>T.14</td><td>Subcódigo (ver detalle verificado abajo)</td></tr>
        <tr><td>T.15</td><td>Código de módulo (ver detalle verificado abajo)</td></tr>
        <tr><td>T.16</td><td>Subcódigo de módulo (ver detalle verificado abajo)</td></tr>
      </table>
      ${INFO("Ejemplo de lectura combinada: una falla F1 con T.8 (tensión de bus CC) elevada en el mismo evento sugiere que el disparo fue inducido por energía de frenado regenerativa más que por sobrecarga mecánica pura — dato que orienta el diagnóstico hacia el tiempo de deceleración en vez del motor.")}
      ${IMG("panel-historial-fallas-m5.png", "Pantalla del panel de control — menú M5, Historial de Fallos", "Vacon-NXS-NXP-User-Manual-DPD01220F-ES, sección 7.8, p.91")}

      ${H3("Detalle verificado T.14 / T.15 / T.16 (fuente: capacitación \"Fallas típicas VDF turno OLAP\")")}
      <p><strong>T.14 — Subcódigo:</strong> distingue si el origen es un <strong>fallo de sistema</strong> (subcódigos S1...Snº, ver Unidad de Fallo de Sistema código 8) o un <strong>fallo de aplicación</strong> (código A1).</p>
      <table class="tech">
        <tr><th>T.15 — Código de módulo</th></tr>
        <tr><td>Potencia</td></tr><tr><td>Potencia1</td></tr><tr><td>Potencia2</td></tr>
        <tr><td>Control</td></tr><tr><td>Expansión</td></tr><tr><td>Adaptación</td></tr>
        <tr><td>Acoplador en estrella</td></tr><tr><td>Motor</td></tr><tr><td>Software</td></tr>
      </table>
      <table class="tech">
        <tr><th>T.16 — Subcódigo de módulo</th></tr>
        <tr><td>Unidad</td></tr><tr><td>Carta</td></tr>
        <tr><td>Fase U</td></tr><tr><td>Fase V</td></tr><tr><td>Fase W</td></tr>
        <tr><td>Ranura A</td></tr><tr><td>Ranura B</td></tr><tr><td>Ranura C</td></tr><tr><td>Ranura D</td></tr><tr><td>Ranura E</td></tr>
        <tr><td>Aplicación</td></tr>
      </table>
    </div>
  `,
  quiz:[
    { q:"Según el manual VACON, ¿a qué falla corresponde el código F9?", options:["Falla a tierra","Baja tensión","Sobrecorriente","Fallo de slot"], answer:1, explain:"F9 corresponde a Baja tensión, no a falla a tierra." },
    { q:"¿Qué código representa la falla a tierra según el manual?", options:["F1","F2","F3","F9"], answer:2, explain:"F3 es el código oficial de falla a tierra en el manual VACON." },
    { q:"Un variador dispara F1 (sobrecorriente) tras un aumento súbito de carga. ¿Cuál es la corriente umbral típica que dispara esta falla?", options:[">1×I_High",">4×I_High",">10×I_High","No depende de I_High"], answer:1, explain:"El manual asocia F1 a una corriente superior a 4 veces I_High." },
    { q:"El variador muestra F52 en terreno. ¿Cuál es la causa más probable?", options:["Sobrecorriente en el motor","Conexión defectuosa entre el panel/NCDrive y el variador","Falla de aislación en el motor","Tensión de bus CC baja"], answer:1, explain:"F52 se asocia a un fallo de comunicación entre el panel de control (o NCDrive) y el variador." },
    { q:"¿Qué dato queda registrado en el parámetro T.8 del historial de fallas y para qué sirve cruzarlo con una falla F1?", options:["Corriente de motor; no aporta al diagnóstico de F1","Tensión de bus CC; ayuda a distinguir si el disparo fue por energía regenerativa o por sobrecarga mecánica","Temperatura del variador; indica desgaste del ventilador","Sentido de giro; solo sirve para F3"], answer:1, explain:"T.8 congela la tensión de bus CC en el instante de la falla, dato clave para diferenciar un disparo F1 por energía regenerativa de uno por sobrecarga mecánica." },
    { q:"¿Qué distingue el parámetro T.14 (Subcódigo) según el detalle verificado de la capacitación interna?", options:["Solo el número de días de funcionamiento","Si el origen es un fallo de sistema (S1...Snº) o un fallo de aplicación (A1)","La temperatura del variador","El sentido de giro del motor"], answer:1, explain:"T.14 distingue entre fallo de sistema (subcódigos S1...Snº) y fallo de aplicación (código A1)." }
  ]
},

{
  id:'gama-frames', title:'Código de tipo, gama de potencia y clases físicas (FR4-FR14)', short:'Código de tipo / Frames',
  eyebrow:'Módulo 08 · Gama de producto', sub:'Cómo leer la placa de tipo NXS/NXP y las clases físicas FR10-FR14 de alta potencia.',
  content:`
    <div class="card">
      <p>Este módulo complementa la Unidad 2 (Arquitectura) con el detalle real de <strong>cómo decodificar la placa de tipo</strong> del equipo y con las clases físicas de mayor potencia (FR10-FR14), no cubiertas en los manuales de tarjetas. Fuente: capacitación interna "Vacon NXP".</p>

      ${H3("Cómo leer el código de tipo (etiquetado NXS/NXP)")}
      <table class="tech">
        <tr><th>Campo</th><th>Valores posibles</th></tr>
        <tr><td>Gama de producto</td><td>NXS = estándar · NXP = alto rendimiento · NXI = INU (unidad inversora)</td></tr>
        <tr><td>Corriente nominal (sobrecarga baja)</td><td>Ej.: 0007=7A · 0022=22A · 0205=205A</td></tr>
        <tr><td>Tensión nominal de red (3~)</td><td>2 = 208-240 Vac · 5 = 380-500 Vac · 6 = 525-690 Vac</td></tr>
        <tr><td>Panel de control</td><td>A=estándar alfanumérico · B=sin panel local · F=panel ficticio (dummy) · G=display gráfico</td></tr>
        <tr><td>Clase de protección</td><td>0=IP00 (solo FR9) · 2/3=IP21/NEMA1 · 5/7=IP54/NEMA12</td></tr>
        <tr><td>Nivel de emisión EMC</td><td>C=1er entorno sin restricción · H=1er entorno restringido/2do entorno · L=2do entorno distribución restringida · T=redes IT · N=sin protección EMC</td></tr>
        <tr><td>Chopper de frenado</td><td>0=sin chopper · 1=chopper interno · 2=chopper interno + resistencia</td></tr>
        <tr><td>Tarjetas de opción (por slot A-E)</td><td>A=E/S básica · B=E/S expansión · C=bus de campo · D=tarjeta especial/adaptación</td></tr>
      </table>
      ${IMG("etiquetado-codigo-nxs-nxp.png", "Decodificación del código de tipo — placa NXS/NXP", "Vacon NXP.pdf (capacitación interna), \"Etiquetado\"")}
      ${INFO("Aplicación práctica: antes de reemplazar una tarjeta o repuesto, siempre leer el código de tipo completo de la placa física (no solo confiar en el modelo comercial) — dos equipos \"iguales\" pueden diferir en tensión, panel, protección o tarjetas de opción según el pedido de fábrica.")}
    </div>

    <div class="card">
      ${H3("Clases físicas de alta potencia — NXP Standalone y módulos FR10-FR14")}
      <ul>
        <li><strong>NXP Standalone:</strong> unidad compacta para altas potencias con reactor de CA y fusibles aR integrados; opcionales: interruptor de desconexión, chopper de frenado y terminales de bus DC.</li>
        <li><strong>FR12:</strong> son dos unidades FR10 en paralelo.</li>
        <li><strong>Módulos NXP (frames 10-14):</strong> diseñados para instalación simplificada en gabinetes (control, energía y refrigeración integrados en una unidad compacta), con reactores de CA externos; para redes 380-500V/525-690V a 50-60Hz. Alimentación de 6 pulsos como estándar (opcional 12 pulsos). Usan <strong>DriveSynch</strong> para mayores potencias y redundancia del sistema.</li>
      </ul>
      ${IMG("fr11-modulos-fase.png", "FR11 — vista de módulos de fase (Figura 6)", "Vacon NXP.pdf (capacitación interna), \"FR 11 potencia\"")}

      ${H3("FR13 y FR14 — módulos IP00 de muy alta potencia")}
      <p>Ambos son módulos IP00 compuestos por unidades rectificadoras e inversoras; el número de unidades rectificadoras depende de la corriente y del número de pulsos configurado.</p>
      ${IMG("fr13-modulos-ip00.png", "FR13 — módulos IP00 (rectificador + inversor) con tabla de potencia", "Vacon NXP.pdf (capacitación interna), \"FR 13\"")}
      ${NOTE("Los valores exactos de potencia/corriente de la tabla FR13/FR14 solo son legibles con certeza en la imagen incluida arriba (la extracción de texto de esa diapositiva no devolvió los números en formato de texto plano) — usar la imagen como referencia visual, no transcribir de memoria.")}
    </div>

    <div class="card">
      ${H3("Catálogo general de tarjetas de expansión (familia VACON NX)")}
      <p>Más allá de las 5 tarjetas realmente instaladas en este equipo (ver Unidad 3), el catálogo general de la familia VACON NX incluye tres tipos de unidad de expansión:</p>
      <ul>
        <li><strong>E/S:</strong> entradas digitales (CA/CC), salidas digitales (transistor/relé), termistor, PT100, etc.</li>
        <li><strong>Encoder:</strong> TTL, HTL, EnDat/SSI, Sin/Cos o resolver.</li>
        <li><strong>Comunicación:</strong> Profibus DP, DeviceNet, Modbus RTU/TCP, CANopen, Profinet IO, EtherNet/IP, BACnet, entre otros.</li>
      </ul>
      ${NOTE("Esta lista es el catálogo general de tarjetas disponibles para la familia VACON NX (según la capacitación interna), no una lista de lo instalado en este equipo específico. Las tarjetas de comunicación realmente instaladas en este variador son OPTCI (Modbus/TCP) y OPTC5 (Profibus DP) — ver Unidades 3 y 4.")}
    </div>
  `,
  quiz:[
    { q:"En el código de tipo NXS/NXP, ¿qué significa el dígito de tensión \"5\"?", options:["208-240 Vac","380-500 Vac","525-690 Vac","No indica tensión"], answer:1, explain:"El dígito 5 en el campo de tensión nominal de red corresponde a 380-500 Vac." },
    { q:"¿Qué diferencia hay entre las gamas NXS y NXP en el código de tipo?", options:["Ninguna, son el mismo producto","NXS = estándar, NXP = alto rendimiento (también existe NXI = unidad inversora)","NXP es solo para bombas","NXS no admite panel de control"], answer:1, explain:"NXS es la gama estándar y NXP la de alto rendimiento; NXI corresponde a la unidad inversora (INU)." },
    { q:"¿Qué es un módulo FR12?", options:["Una tarjeta de comunicación","Dos unidades FR10 en paralelo","Un tipo de encoder","Un panel de control"], answer:1, explain:"FR12 consiste en dos unidades FR10 conectadas en paralelo." },
    { q:"¿Qué tecnología usan los módulos NXP (frames 10-14) para mayores potencias y redundancia del sistema?", options:["NCDrive","DriveSynch","DriveWindow","Modbus/TCP"], answer:1, explain:"DriveSynch se utiliza en los módulos NXP de frames 10-14 para mayores potencias y redundancia." },
    { q:"El catálogo general de tarjetas de comunicación de la familia VACON NX menciona CANopen, Profinet IO, EtherNet/IP y BACnet. ¿Significa esto que este equipo específico las tiene instaladas?", options:["Sí, todas están instaladas","No — este equipo solo tiene instaladas OPTCI (Modbus/TCP) y OPTC5 (Profibus DP); el resto es catálogo general de la familia","Sí, pero solo BACnet","No, este equipo no soporta ninguna comunicación"], answer:1, explain:"El catálogo general de la familia no equivale a lo instalado en este equipo específico, que solo tiene OPTCI y OPTC5." }
  ]
},

{
  id:'mantenimiento', title:'Mantenimiento preventivo y almacenamiento prolongado', short:'Mantenimiento',
  eyebrow:'Módulo 09 · Mantenimiento', sub:'Recomendaciones de fabricante para almacenamiento y reformado de condensadores CC.',
  content:`
    <div class="card">
      <p>Un variador almacenado (repuesto en bodega, equipo de respaldo, etc.) no está exento de mantenimiento: los condensadores electrolíticos del bus de CC se degradan con el tiempo sin uso. Esta unidad transcribe textualmente las recomendaciones de fabricante citadas en la capacitación interna "Vacon NXP".</p>

      ${H3("Recomendaciones de almacenamiento (según capacitación interna, cita textual)")}
      <ul>
        <li><strong>Ambiente:</strong> no debe existir polvo en el ambiente; si hay polvo en suspensión, el convertidor debe protegerse adecuadamente para evitar que entre en su interior.</li>
        <li><strong>Ciclo normal (hasta 24 meses):</strong> si el convertidor se almacena por períodos prolongados, debe conectarse el sistema de alimentación al convertidor <strong>una vez cada 24 meses, durante 2 horas como mínimo</strong>.</li>
        <li><strong>Más de 24 meses sin ese ciclo:</strong> se debe tener cuidado al cargar los condensadores CC electrolíticos — por eso no se recomienda un período de almacenamiento tan largo sin el ciclo anterior.</li>
      </ul>

      ${NOTE("<strong>Procedimiento de recarga de condensadores</strong> (solo si se superó el período de 24 meses sin conectar la alimentación normalmente): usar una fuente de alimentación de CC con límite de intensidad ajustable, fijado por ejemplo entre <strong>300 y 500 mA</strong>, conectada a los terminales <strong>B+/B-</strong> (terminales de alimentación de CC). La tensión de CC debe ajustarse al nivel nominal de la unidad (<strong>1,35 × Un CA</strong>) y mantenerse durante al menos <strong>1 hora</strong>.")}

      ${NOTE("Si no se dispone de una fuente de CC y la unidad estuvo almacenada durante <strong>mucho más de un año sin energía</strong>, se debe contactar a fábrica antes de conectarla a la alimentación — no improvisar el reformado de condensadores en ese escenario.")}

      ${INFO("Contexto general de mantenimiento preventivo (no cita textual): además del ciclo de energizado periódico, es buena práctica de terreno inspeccionar visualmente ventiladores y filtros de aire, verificar apriete de terminales de potencia (la vibración y los ciclos térmicos aflojan conexiones con el tiempo), y registrar cada intervención para poder correlacionar fallas futuras con el historial de mantenimiento del equipo.")}
    </div>
  `,
  quiz:[
    { q:"En condiciones normales de almacenamiento prolongado, ¿cada cuánto tiempo debe conectarse la alimentación al convertidor, y por cuánto tiempo mínimo?", options:["Cada 6 meses, 30 minutos","Cada 24 meses, 2 horas como mínimo","Cada 5 años, 10 minutos","Nunca es necesario"], answer:1, explain:"El ciclo normal recomendado es conectar la alimentación una vez cada 24 meses, durante al menos 2 horas." },
    { q:"Si el período de almacenamiento supera los 24 meses sin ese ciclo, ¿a qué terminales se conecta la fuente de CC para recargar los condensadores?", options:["U, V, W","R+/R-","B+/B- (terminales de alimentación de CC)","AI1/AI2"], answer:2, explain:"La fuente de alimentación de CC para recargar los condensadores se conecta a los terminales B+/B-." },
    { q:"¿A qué nivel debe ajustarse la tensión de CC durante el procedimiento de recarga de condensadores, y por cuánto tiempo mínimo?", options:["1,35 × Un CA, durante al menos 1 hora","2 × Un CA, durante 10 minutos","Un CA fijo, durante 24 horas","No se especifica ningún valor"], answer:0, explain:"La tensión de CC debe ajustarse a 1,35 veces la tensión CA nominal de la unidad y mantenerse durante al menos 1 hora." },
    { q:"¿Qué límite de corriente se recomienda para la fuente de CC durante el reformado de condensadores?", options:["300-500 mA","5-10 A","1-2 A","No se debe limitar la corriente"], answer:0, explain:"Se recomienda un límite de intensidad ajustable, por ejemplo entre 300 y 500 mA." },
    { q:"Si la unidad estuvo almacenada mucho más de un año sin energía y no hay fuente de CC disponible, ¿qué se debe hacer antes de conectarla a la alimentación?", options:["Conectarla directamente, no hay riesgo","Contactar a fábrica antes de conectarla","Aplicar tensión nominal completa de inmediato","Reemplazar todos los condensadores sin verificar"], answer:1, explain:"En ese escenario el fabricante recomienda contactar a fábrica antes de conectar la unidad a la alimentación." }
  ]
},

{
  id:'fallo-sistema-sto', title:'Fallo de Sistema (código 8) y Safe Torque Off (8-30)', short:'Fallo Sistema / STO',
  eyebrow:'Módulo 10 · Diagnóstico avanzado', sub:'Subcódigos S1-S11 del fallo de sistema y troubleshooting de la falla STO 8-30.',
  content:`
    <div class="card">
      <p>El <strong>Fallo de Sistema (código 8)</strong> es una de las fallas VACON NX más frecuentes en terreno según la capacitación "Fallas típicas VDF turno OLAP". Este módulo detalla sus subcódigos (T.14=S1...S11) y complementa el diagnóstico de la falla <strong>Safe Torque Off (8-30)</strong> ya introducida a nivel de hardware en la Unidad 3.</p>

      ${H3("Subcódigos del Fallo de Sistema (código 8) — según capacitación interna, cita textual")}
      <table class="tech">
        <tr><th>Subcódigo</th><th>Significado</th></tr>
        <tr><td>S1</td><td>Realimentación de tensión motor</td></tr>
        <tr><td>S2</td><td>Reservado</td></tr>
        <tr><td>S3</td><td>Reservado</td></tr>
        <tr><td>S4</td><td>Disparo ASIC</td></tr>
        <tr><td>S5</td><td>Perturbación en VaconBus</td></tr>
        <tr><td>S6</td><td>Realimentación del contacto de carga</td></tr>
        <tr><td>S7</td><td>Contacto de carga</td></tr>
        <tr><td>S8</td><td>Sin alimentación en driver card</td></tr>
        <tr><td>S9</td><td>Comunicación unidad de potencia (TX)</td></tr>
        <tr><td>S10</td><td>Comunicación unidad de potencia (Disparo)</td></tr>
        <tr><td>S11</td><td>Comunicación unidad de potencia (medición)</td></tr>
      </table>
      ${INFO("Lectura práctica: un Fallo de Sistema con subcódigo S8 o S9-S11 suele apuntar a un problema de comunicación/alimentación entre la tarjeta de control y la unidad de potencia (cableado de fibra óptica o conector D dañado/desconectado — ver Unidad 2), más que a un problema del motor o la carga.")}

      ${H3("Fallo Safe Torque Off — código 8-30 (troubleshooting)")}
      <p>El STO es un sistema de seguridad integrado en la tarjeta opcional OPT-AF. Su función principal es aislar las señales de salida que controlan los IGBT del inversor — esto no aísla eléctricamente el inversor, sino que impide que la unidad genere par en el eje del motor. Se usa típicamente para prevenir un arranque inesperado o como función de paro de emergencia.</p>
      <ul>
        <li>Si el STO se activa sin que se haya solicitado intencionalmente un paro seguro, verificar primero el estado de los canales <strong>SD1/SD2</strong> (ver detalle de hardware en Unidad 3) — una apertura de uno solo de los canales indica discrepancia, no una activación intencional.</li>
        <li>Verificar la resistencia de la entrada de termistor: si se mantiene sobre 4000 Ω el circuito seguirá disparado aunque se intente resetear; debe bajar de 2000 Ω para considerarse normal.</li>
        <li>Confirmar la posición del jumper X10 (supervisión de cortocircuito de termistor) — una posición incorrecta puede generar disparos falsos.</li>
        <li>Revisar la referencia de cableado X12 contra el esquema del capítulo 4.2.4 del manual OPTAF antes de descartar un problema de continuidad en el circuito de seguridad.</li>
      </ul>
      ${NOTE("Por tratarse de un circuito de seguridad certificado, nunca puentear manualmente los canales SD1/SD2 para \"forzar\" el rearme — esa acción invalida la certificación de seguridad de la tarjeta y expone a riesgo de arranque inesperado. Ver Unidad 3 para el detalle completo de hardware de OPTAF.")}
    </div>
  `,
  quiz:[
    { q:"Según la capacitación interna, ¿qué significa el subcódigo S4 del Fallo de Sistema (código 8)?", options:["Reservado","Disparo ASIC","Contacto de carga","Perturbación en VaconBus"], answer:1, explain:"El subcódigo S4 corresponde a Disparo ASIC." },
    { q:"¿Qué subcódigos del Fallo de Sistema apuntan a un problema de comunicación con la unidad de potencia?", options:["S1 y S2","S9, S10 y S11","S6 y S7","S2 y S3"], answer:1, explain:"S9 (TX), S10 (Disparo) y S11 (medición) corresponden todos a comunicación con la unidad de potencia." },
    { q:"Si el STO (8-30) se activa y solo uno de los canales SD1/SD2 se abrió, ¿qué indica esto?", options:["Una activación intencional válida","Discrepancia de canal, no una activación intencional de paro seguro","Que el termistor está en buen estado","Que el jumper X12 está mal instalado siempre"], answer:1, explain:"Ambos canales deben abrirse simultáneamente para una activación válida del STO; que solo uno se abra indica discrepancia de canal." },
    { q:"¿Por debajo de qué resistencia debe bajar el termistor de motor para que la protección se considere reseteada/normal?", options:["4000 Ω","2000 Ω","10000 Ω","500 Ω"], answer:1, explain:"La protección se resetea cuando la resistencia del termistor baja de 2000 Ω; se activa al superar 4000 Ω." },
    { q:"¿Por qué no se debe puentear manualmente los canales SD1/SD2 para forzar el rearme del STO?", options:["Porque no tiene ningún efecto","Porque invalida la certificación de seguridad de la tarjeta y expone a riesgo de arranque inesperado","Porque daña el termistor de forma permanente","Porque activa automáticamente el Fallo de Sistema"], answer:1, explain:"Puentear manualmente los canales de un circuito de seguridad certificado invalida su certificación y puede provocar un arranque inesperado." }
  ]
},

{
  id:'pulsadores-panel', title:'Pulsadores del panel de control', short:'Pulsadores del panel',
  eyebrow:'Módulo 11 · Interfaz de operador', sub:'Función exacta de los 9 pulsadores del panel de control VACON NX — según capacitación interna.',
  content:`
    <div class="card">
      <p>Este módulo complementa la Unidad 5 (Programación/NCDrive) con la función real de cada uno de los <strong>9 pulsadores</strong> del panel de control, según la capacitación interna "Vacon NXP".</p>
      ${H3("Función de cada pulsador (cita textual)")}
      <table class="tech">
        <tr><th>Pulsador</th><th>Función</th></tr>
        <tr><td>Reset</td><td>Se utiliza para restaurar fallos activos.</td></tr>
        <tr><td>Select</td><td>Cambia entre las dos últimas visualizaciones. Útil para comprobar la influencia que ejerce un valor modificado en algún otro valor.</td></tr>
        <tr><td>Enter</td><td>1) Confirmar selecciones. 2) Restablecer historial de fallos (manteniendo presionado 2-3 segundos).</td></tr>
        <tr><td>Navegador arriba (∧)</td><td>Explorar el menú principal y las páginas de diferentes submenús; editar valores.</td></tr>
        <tr><td>Navegador abajo (∨)</td><td>Explorar el menú principal y las páginas de diferentes submenús; editar valores.</td></tr>
        <tr><td>Menú izquierda (&lt;)</td><td>Retroceder en el menú; mover el cursor a la izquierda (en el menú de parámetros); salir del modo de edición; mantener presionado 3 segundos para volver al menú principal.</td></tr>
        <tr><td>Menú derecha (&gt;)</td><td>Avanzar en el menú; mover el cursor a la derecha (en el menú de parámetros); entrar en el modo de edición.</td></tr>
        <tr><td>Marcha (◇ verde)</td><td>Pone en marcha el motor, si el panel es el lugar de control activo.</td></tr>
        <tr><td>Paro (▽ rojo)</td><td>Detiene el motor.</td></tr>
      </table>
      ${IMG("pulsadores-panel-control.png", "Pulsadores del panel de control y su función", "Vacon NXP.pdf (capacitación interna), \"Pulsadores panel de control\"")}
      ${INFO("Nota práctica: el pulsador Enter mantenido 2-3 segundos borra el historial de fallas (M5) — distinto de Reset, que solo limpia la falla activa que está bloqueando la marcha. Confundir ambos pulsadores puede hacer perder el historial de fallas útil para diagnóstico antes de haberlo revisado.")}
    </div>
  `,
  quiz:[
    { q:"¿Qué pulsador se utiliza específicamente para restaurar fallos activos?", options:["Select","Reset","Enter","Navegador arriba"], answer:1, explain:"Reset se utiliza para restaurar fallos activos." },
    { q:"¿Qué hace el pulsador Select?", options:["Pone en marcha el motor","Cambia entre las dos últimas visualizaciones","Borra el historial de fallas","Entra en modo de edición"], answer:1, explain:"Select cambia entre las dos últimas visualizaciones, útil para comparar el efecto de un valor modificado en otro." },
    { q:"¿Cómo se restablece el historial de fallas (no solo la falla activa) usando el panel?", options:["Presionando Select una vez","Presionando Enter durante 2-3 segundos","Presionando Marcha y Paro juntos","No es posible desde el panel"], answer:1, explain:"Mantener presionado Enter durante 2-3 segundos restablece el historial de fallas; Reset solo limpia la falla activa." },
    { q:"¿Qué acción permite el pulsador de Menú izquierda (&lt;) al mantenerlo presionado 3 segundos?", options:["Apagar el panel","Volver al menú principal","Poner en marcha el motor","Borrar el historial de fallas"], answer:1, explain:"Mantener presionado el pulsador de Menú izquierda durante 3 segundos regresa al menú principal." },
    { q:"¿En qué condición el pulsador de Marcha (◇ verde) efectivamente pone en marcha el motor?", options:["Siempre, sin excepción","Solo si el panel de control es el lugar de control activo","Solo si hay una falla activa","Solo durante el ID Run"], answer:1, explain:"El pulsador de Marcha solo pone en marcha el motor si el panel es el lugar de control activo (ver indicadores a/b/c de la Unidad 5)." }
  ]
},

{
  id:'vistas-despiezadas', title:'Vistas despiezadas y repuestos — clases FR4 a FR9', short:'Despiece / Repuestos',
  eyebrow:'Módulo 12 · Repuestos y mantenimiento', sub:'Diagramas de despiece y códigos de repuesto para las clases de bastidor de montaje en pared.',
  content:`
    <div class="card">
      <p>Cada clase de bastidor de montaje en pared (FR4 a FR9, ver Unidad 2) tiene su propio diagrama de despiece y listado de códigos de repuesto documentado en la capacitación interna "Vacon NXP". Conocer esta estructura acelera la identificación de repuestos en terreno sin tener que desarmar el equipo para "adivinar" qué pieza corresponde.</p>

      ${H3("FR4 — vista despiezada y lista de repuestos (ejemplo completo)")}
      <p>El diagrama de despiece numera cada componente (1 a 17 en FR4) y lo relaciona con un código de repuesto y su aplicabilidad por tensión (230V/500V). Por ejemplo: el panel de control y la unidad de control (ítems 1-2) son comunes a ambas tensiones; la tarjeta de potencia (ítem 7) tiene un código distinto para 230V (<code>70CVB00908</code>) que para 500V (<code>70CVB00910</code>); el marco (ítem 12) varía según el rango de corriente (<code>FR04000</code> para 3-9A, <code>FR04015</code> para 12A/INU).</p>
      ${IMG("fr4-vista-despiezada.png", "FR4 — vista despiezada con tabla de códigos de repuesto", "Vacon NXP.pdf (capacitación interna), \"FR4\"")}

      ${H3("FR9 — vista despiezada (bastidor de mayor potencia dentro del rango de montaje en pared)")}
      <p>El mismo principio de despiece se aplica a FR9, con una lista de repuestos considerablemente más extensa (44 ítems numerados) que refleja la mayor complejidad del bastidor: ventilador DC dedicado, filtro EMC, barras colectoras paralelas (busbars) y protecciones adicionales de terminales DC, entre otros.</p>
      ${IMG("fr9-vista-despiezada.png", "FR9 — vista despiezada con tabla de códigos de repuesto", "Vacon NXP.pdf (capacitación interna), \"FR9 potencia\"")}

      ${NOTE("Los diagramas de despiece de FR5, FR6, FR6 690V, FR7 y FR8 siguen el mismo formato (imagen de despiece + tabla de códigos de repuesto) en la capacitación interna, pero no se transcriben aquí uno por uno para no duplicar contenido — el principio de lectura es idéntico al de FR4 y FR9 mostrados arriba. Consultar la capacitación interna \"Vacon NXP\" directamente si se necesita el código de un repuesto de una clase intermedia (FR5-FR8).")}

      ${INFO("Aplicación práctica: antes de pedir un repuesto, identificar primero el número de ítem en el diagrama de despiece correspondiente a la clase de bastidor del equipo (ver código de tipo, Unidad 8) y confirmar la tensión (230V/500V) — varios componentes (ej. tarjeta de potencia, choke/filtro AC) tienen códigos de repuesto distintos según la tensión nominal, aunque se vean físicamente similares.")}
    </div>
  `,
  quiz:[
    { q:"¿Qué documenta el diagrama de despiece de cada clase de bastidor (FR4-FR9)?", options:["Solo un dibujo sin códigos", "Cada componente numerado junto con su código de repuesto y aplicabilidad por tensión", "Solo las dimensiones externas del gabinete", "Solo el precio de cada repuesto"], answer:1, explain:"El diagrama numera cada pieza y la relaciona con su código de repuesto y la tensión (230V/500V) a la que aplica." },
    { q:"En el despiece de FR4, ¿por qué la tarjeta de potencia (ítem 7) tiene dos códigos de repuesto distintos?", options:["Por error de catálogo","Porque varían según la tensión: 70CVB00908 (230V) y 70CVB00910 (500V)","Porque uno es original y otro genérico","No tiene códigos distintos"], answer:1, explain:"La tarjeta de potencia tiene un código para 230V y otro distinto para 500V." },
    { q:"¿Qué diferencia notable existe entre el despiece de FR9 y el de FR4?", options:["FR9 no tiene lista de repuestos","FR9 tiene una lista considerablemente más extensa (44 ítems) reflejando mayor complejidad (ventilador DC, filtro EMC, busbars)","FR4 es más complejo que FR9","Son exactamente iguales"], answer:1, explain:"FR9 documenta 44 ítems de repuesto frente a los 17 de FR4, reflejando su mayor potencia y complejidad." },
    { q:"¿Qué se debe confirmar antes de pedir un repuesto según la recomendación práctica de esta unidad?", options:["Solo el color del componente","El número de ítem en el diagrama de despiece de la clase de bastidor correspondiente y la tensión nominal (230V/500V)","Nada, todos los repuestos son universales","Solo la fecha de fabricación"], answer:1, explain:"Hay que identificar el ítem correcto en el diagrama de la clase de bastidor y confirmar la tensión, ya que varios componentes cambian de código según la tensión." },
    { q:"¿Se transcriben en esta unidad, uno por uno, los diagramas de despiece de FR5, FR6, FR7 y FR8?", options:["Sí, en detalle completo","No — siguen el mismo formato que FR4/FR9 y se remite a la capacitación interna para no duplicar contenido","No existen esos diagramas","Solo FR6 tiene diagrama"], answer:1, explain:"Para evitar duplicar contenido, esta unidad muestra FR4 y FR9 como ejemplos completos y remite a la fuente original para las clases intermedias." }
  ]
}
];

/* ============================================================
   ESTADO + PERSISTENCIA (localStorage)
   ============================================================ */
const STORAGE_KEY = 'vacon_training_progress_v2';
const THEME_KEY = 'capacitacion-theme';

const state = {
  currentId: 'overview',
  view: 'learn',
  quizProgress: {},
  quizIndex: {},
};
MODULES.forEach(m=>{
  if(m.quiz){ state.quizProgress[m.id] = { answered: new Array(m.quiz.length).fill(null) }; state.quizIndex[m.id] = 0; }
});

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    MODULES.forEach(m=>{
      if(!m.quiz) return;
      const savedAnswers = saved && saved[m.id];
      if(Array.isArray(savedAnswers) && savedAnswers.length === m.quiz.length){
        state.quizProgress[m.id].answered = savedAnswers;
      }
    });
  }catch(e){ console.warn('No se pudo cargar el progreso guardado:', e); }
}
function saveProgress(){
  try{
    const data = {};
    MODULES.forEach(m=>{ if(m.quiz) data[m.id] = state.quizProgress[m.id].answered; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){ console.warn('No se pudo guardar el progreso:', e); }
  syncPortalProgress();
}
function syncPortalProgress(){
  try{
    const teachable = MODULES.filter(m=>!m.isOverview);
    const total = teachable.reduce((s,m)=>s+m.quiz.length,0);
    const done = teachable.reduce((s,m)=>s+state.quizProgress[m.id].answered.filter(a=>a!==null).length,0);
    localStorage.setItem('vfd_progress_vacon-nxp', JSON.stringify({ done, total }));
  }catch(e){ console.warn('No se pudo sincronizar el progreso con el portal:', e); }
}
function resetAllProgress(){
  MODULES.forEach(m=>{
    if(!m.quiz) return;
    state.quizProgress[m.id].answered = new Array(m.quiz.length).fill(null);
    state.quizIndex[m.id] = 0;
  });
  saveProgress();
  render();
}
loadProgress();
syncPortalProgress();

/* ============================================================
   TEMA
   ============================================================ */
function applyTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  if(saved === 'light'){ document.documentElement.classList.add('light-theme'); }
  else { document.documentElement.classList.remove('light-theme'); }
}
applyTheme();
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const isLight = document.documentElement.classList.toggle('light-theme');
  localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
});

/* ============================================================
   ANIMACIÓN DE ENTRADA
   ============================================================ */
function animateIn(container){
  const items = container.querySelectorAll('.modhead, .card, .fig, .ovwcard, .qcard, .barwrap, .flash');
  items.forEach((el,i)=>{ el.classList.add('reveal'); el.style.transitionDelay = Math.min(i*70,560)+'ms'; });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ items.forEach(el=>el.classList.add('in')); }));
}

/* ============================================================
   SIDEBAR
   ============================================================ */
function ledStateFor(m){
  if(m.isOverview) return '';
  const p = state.quizProgress[m.id];
  if(!p) return '';
  const answeredCount = p.answered.filter(a=>a!==null).length;
  if(answeredCount===0) return '';
  if(answeredCount < m.quiz.length) return 'partial';
  return 'done';
}
let sidebarAnimated = false;
function renderSidebar(){
  const ul = document.getElementById('navlist');
  ul.innerHTML = '';
  MODULES.forEach((m,i)=>{
    const li = document.createElement('li');
    li.className = 'navitem' + (state.currentId===m.id ? ' active' : '');
    if(!sidebarAnimated){ li.style.animation = `slideInLeft .45s cubic-bezier(.2,.7,.3,1) ${i*35}ms both`; }
    const ledClass = ledStateFor(m);
    li.innerHTML = `
      ${m.isOverview ? '<span class="led"></span>' : `<span class="led ${ledClass}"></span>`}
      <span class="num">${m.isOverview ? '★' : String(i).padStart(2,'0')}</span>
      <span class="label">${m.short}</span>
    `;
    li.onclick = ()=>{ state.currentId = m.id; state.view = 'learn'; render(); window.scrollTo(0,0); };
    ul.appendChild(li);
  });
  sidebarAnimated = true;
}

/* ============================================================
   OVERVIEW
   ============================================================ */
function renderOverview(){
  const teachable = MODULES.filter(m=>!m.isOverview);
  const totalQ = teachable.reduce((s,m)=>s+m.quiz.length,0);
  const answeredQ = teachable.reduce((s,m)=>s+state.quizProgress[m.id].answered.filter(a=>a!==null).length,0);
  const pct = totalQ ? Math.round(answeredQ/totalQ*100) : 0;

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="modhead">
      <p class="eyebrow">Capacitación · VACON NXP</p>
      <h2>Biblioteca de módulos</h2>
      <p class="sub">Navega libremente entre los 12 módulos. Cada uno tiene su contenido técnico y su quiz — el progreso se guarda automáticamente en este navegador.</p>
    </div>
    <div class="barwrap"><div class="barfill" style="width:${pct}%"></div></div>
    <p style="font-family:var(--mono); font-size:11.5px; color:var(--text-dim); margin:8px 0 24px 0;">${answeredQ} / ${totalQ} preguntas respondidas · ${pct}%</p>
    ${pct===100 ? `
    <div class="card" style="border-color:var(--emerald); background:var(--emerald-dim);">
      <h3 style="color:var(--emerald); margin-top:0;">🏆 Capacitación completa</h3>
      <p style="margin-bottom:0;">Completaste el quiz de los 12 módulos de la capacitación VACON NXP. Puedes reintentar cualquier módulo cuando quieras para reforzar los conceptos con menos aciertos.</p>
    </div>` : ''}
    <div class="ovwgrid">
      ${teachable.map((m,i)=>{
        const p = state.quizProgress[m.id];
        const answered = p.answered.filter(a=>a!==null).length;
        const correct = p.answered.reduce((s,a)=> s + (a===true?1:0), 0);
        let status = 'sin iniciar';
        if(answered>0 && answered<m.quiz.length) status = `en curso · ${answered}/${m.quiz.length}`;
        if(answered===m.quiz.length) status = `completo · ${correct}/${m.quiz.length} correctas`;
        const startBadge = m.id==='seguridad' ? `<span style="font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--emerald); border:1px solid var(--emerald); border-radius:4px; padding:2px 6px; margin-left:8px;">Empieza aquí</span>` : '';
        return `<div class="ovwcard" data-id="${m.id}">
          <div class="top"><span class="t-title">${String(i).padStart(2,'0')} · ${m.title}${startBadge}</span><span class="led ${ledStateFor(m)}"></span></div>
          <div class="t-sub">${m.sub}</div>
          <div class="t-status" style="margin-top:10px;">${status}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="resetrow">
      <button class="btn ghost" id="resetAllBtn">Borrar todo el progreso guardado</button>
    </div>
  `;
  const resetBtn = document.getElementById('resetAllBtn');
  if(resetBtn){
    resetBtn.onclick = ()=>{
      if(confirm('¿Borrar el progreso guardado de todos los módulos? Esta acción no se puede deshacer.')){
        resetAllProgress();
      }
    };
  }
  main.querySelectorAll('.ovwcard').forEach(el=>{
    el.onclick = ()=>{ state.currentId = el.dataset.id; state.view = 'learn'; render(); window.scrollTo(0,0); };
  });
  animateIn(main);
}

/* ============================================================
   MÓDULO (learn / quiz)
   ============================================================ */
function renderModule(m){
  const main = document.getElementById('main');
  const hasCards = !!m.flashcards;
  main.innerHTML = `
    <div class="modhead">
      <p class="eyebrow">${m.eyebrow}</p>
      <h2>${m.title}</h2>
      <p class="sub">${m.sub}</p>
    </div>
    <div class="tabs no-print">
      <div class="tab ${state.view==='learn'?'active':''}" data-v="learn">Aprender</div>
      <div class="tab ${state.view==='quiz'?'active':''}" data-v="quiz">Quiz (${m.quiz.length})</div>
      <div style="margin-left:auto; align-self:center;"><button class="btn ghost" id="printBtn" style="font-size:10.5px; padding:6px 12px;">🖨️ Imprimir esta unidad</button></div>
    </div>
    <div id="modbody"></div>
  `;
  main.querySelectorAll('.tab').forEach(t=>{ t.onclick = ()=>{ state.view = t.dataset.v; render(); }; });
  const printBtn = document.getElementById('printBtn');
  if(printBtn) printBtn.onclick = ()=> window.print();
  const body = document.getElementById('modbody');
  if(state.view==='learn'){
    body.innerHTML = m.content;
    if(hasCards) renderFlashcards(m);
  } else {
    renderQuiz(m, body);
  }
  animateIn(main);
}

function renderFlashcards(m){
  const grid = document.getElementById('flashgrid');
  if(!grid) return;
  grid.innerHTML = m.flashcards.map((f)=>`
    <div class="flash" tabindex="0" role="button" aria-label="Tarjeta ${f.acr}, presiona Enter o Espacio para revelar">
      <div class="flash-inner">
        <div class="flash-face flash-front"><div class="acr">${f.acr}</div><div class="hint">toca para revelar</div></div>
        <div class="flash-face flash-back"><div class="full">${f.full}</div><div class="desc">${f.desc}</div></div>
      </div>
    </div>
  `).join('');
  grid.querySelectorAll('.flash').forEach(el=>{
    el.onclick = ()=> el.classList.toggle('flipped');
    el.onkeydown = (e)=>{
      if(e.key==='Enter' || e.key===' ' || e.key==='Spacebar'){
        e.preventDefault();
        el.classList.toggle('flipped');
      }
    };
  });
}

/* ---------- Quiz engine ---------- */
function renderQuiz(m, body){
  const progress = state.quizProgress[m.id];
  const total = m.quiz.length;
  const answeredAll = progress.answered.every(a=>a!==null);

  if(answeredAll){
    const correct = progress.answered.filter(a=>a===true).length;
    const missed = m.quiz.map((q,qi)=>({q,qi})).filter(x=>progress.answered[x.qi]===false);
    body.innerHTML = `
      <div class="qcard">
        <div class="quizresult">
          <div class="score">${correct}/${total}</div>
          <div class="label">respuestas correctas en este módulo</div>
          <button class="btn ghost" id="retryBtn">Reintentar quiz</button>
        </div>
        ${missed.length ? `
        <div style="text-align:left; margin-top:10px;">
          <h3 style="color:var(--red);">Preguntas a repasar (${missed.length})</h3>
          ${missed.map(x=>`
            <div class="note warn" style="margin:10px 0;">
              <strong>${x.q.q}</strong><br>
              Respuesta correcta: ${x.q.options[x.q.answer]}<br>
              ${x.q.explain}
            </div>
          `).join('')}
        </div>` : ''}
      </div>
    `;
    document.getElementById('retryBtn').onclick = ()=>{
      progress.answered = new Array(total).fill(null);
      state.quizIndex[m.id] = 0;
      saveProgress();
      render();
    };
    return;
  }

  let idx = state.quizIndex[m.id];
  if(progress.answered[idx]!==null){
    idx = progress.answered.findIndex(a=>a===null);
    state.quizIndex[m.id] = idx;
  }
  const q = m.quiz[idx];
  body.innerHTML = `
    <div class="qcounter">Pregunta ${idx+1} de ${total}</div>
    <div class="qcard">
      <p class="qtext">${q.q}</p>
      <div id="optlist">
        ${q.options.map((o,oi)=>`<div class="opt" data-oi="${oi}"><span class="bullet">${String.fromCharCode(65+oi)}</span><span>${o}</span></div>`).join('')}
      </div>
      <div class="explain" id="explainBox">${q.explain}</div>
      <div class="qnav">
        <span style="font-family:var(--mono); font-size:11px; color:var(--text-dim);">selecciona una opción</span>
        <button class="btn" id="nextBtn" disabled>Siguiente</button>
      </div>
    </div>
  `;
  let picked = false;
  document.querySelectorAll('#optlist .opt').forEach(el=>{
    el.onclick = ()=>{
      if(picked) return;
      picked = true;
      const oi = parseInt(el.dataset.oi);
      const isCorrect = oi===q.answer;
      progress.answered[idx] = isCorrect;
      saveProgress();
      document.querySelectorAll('#optlist .opt').forEach(o2=>{
        const oi2 = parseInt(o2.dataset.oi);
        if(oi2===q.answer) o2.classList.add('correct');
        else if(oi2===oi) o2.classList.add('wrong');
      });
      document.getElementById('explainBox').classList.add('show');
      const nb = document.getElementById('nextBtn');
      nb.disabled = false;
      nb.onclick = ()=>{
        state.quizIndex[m.id] = idx+1 < total ? idx+1 : idx;
        render();
      };
      renderSidebar();
    };
  });
}

/* ============================================================
   RENDER PRINCIPAL
   ============================================================ */
function render(){
  renderSidebar();
  const m = MODULES.find(mm=>mm.id===state.currentId);
  if(m.isOverview) renderOverview();
  else renderModule(m);
}

render();
</script>
