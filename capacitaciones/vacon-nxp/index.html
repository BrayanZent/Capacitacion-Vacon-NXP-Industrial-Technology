<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VACON NXP · Capacitación Interactiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f1620;
    --panel: #16202c;
    --panel-raised: #1e2a38;
    --line: #2b3a4a;
    --text: #e6edf5;
    --text-dim: #8fa0b3;
    --sky: #38bdf8;
    --sky-dim: #163244;
    --emerald: #34d399;
    --emerald-dim: #14332a;
    --red: #f87171;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  :root.light-theme{
    --bg: #f3f6fa;
    --panel: #ffffff;
    --panel-raised: #eef2f7;
    --line: #d7e0ea;
    --text: #1b2530;
    --text-dim: #5c6b7d;
    --sky-dim: #e0f2fe;
    --emerald-dim: #d4f5e4;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  ::selection{background:var(--sky-dim);color:var(--text);}

  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes slideInLeft{ from{opacity:0; transform:translateX(-14px);} to{opacity:1; transform:translateX(0);} }
  @keyframes logoIn{ from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);} }
  .reveal{opacity:0; transform:translateY(18px); transition:opacity .55s cubic-bezier(.2,.7,.3,1), transform .55s cubic-bezier(.2,.7,.3,1);}
  .reveal.in{opacity:1; transform:translateY(0);}

  .app{display:flex; min-height:100vh;}
  .sidebar{
    width:280px; flex-shrink:0; background:var(--panel);
    border-right:1px solid var(--line);
    padding:22px 16px; position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{padding:4px 8px 20px 8px; border-bottom:1px solid var(--line); margin-bottom:16px;}
  .brand-logo{width:100%; max-width:170px; display:block; margin:0 0 14px 0; background:#fff; border-radius:6px; padding:8px 10px; animation:logoIn .8s cubic-bezier(.2,.8,.3,1);}
  .brand .tag{font-family:var(--mono); font-size:11px; letter-spacing:.12em; color:var(--emerald); text-transform:uppercase;}
  .brand h1{font-size:18px; margin:6px 0 2px 0; line-height:1.25;}
  .brand p{font-size:12px; color:var(--text-dim); margin:0;}

  .navlist{list-style:none; margin:0; padding:0;}
  .navitem{display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:6px; cursor:pointer; margin-bottom:2px; border:1px solid transparent; transition:background .2s ease, transform .2s ease;}
  .navitem:hover{background:var(--panel-raised); transform:translateX(2px);}
  .navitem.active{background:var(--panel-raised); border-color:var(--line);}
  .led{width:9px; height:9px; border-radius:50%; flex-shrink:0; background:#3a4048; box-shadow:inset 0 0 0 1px rgba(0,0,0,.4);}
  .led.done{background:var(--emerald); box-shadow:0 0 6px rgba(52,211,153,.7);}
  .led.partial{background:var(--sky); box-shadow:0 0 6px rgba(56,189,248,.6);}
  .navitem .num{font-family:var(--mono); font-size:11px; color:var(--text-dim); width:18px;}
  .navitem .label{font-size:13.5px;}
  .navitem.active .label{color:var(--sky);}

  .sidebar-foot{margin-top:18px; padding-top:14px; border-top:1px solid var(--line); font-family:var(--mono); font-size:11px; color:var(--text-dim);}
  .themebtn{margin-top:10px; width:100%; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.04em; background:transparent; color:var(--text-dim); border:1px solid var(--line); padding:8px 10px; border-radius:6px; cursor:pointer;}
  .themebtn:hover{color:var(--text); border-color:var(--sky);}

  .main{flex:1; padding:36px 44px; max-width:920px; animation:fadeIn .5s ease;}
  @media (max-width: 860px){ .app{flex-direction:column;} .sidebar{width:100%; height:auto; position:relative; border-right:none; border-bottom:1px solid var(--line);} .main{padding:24px;} }

  .modhead{margin-bottom:8px;}
  .modhead .eyebrow{font-family:var(--mono); font-size:11.5px; color:var(--sky); letter-spacing:.1em; text-transform:uppercase; margin:0 0 6px 0;}
  .modhead h2{font-size:26px; margin:0 0 6px 0; line-height:1.2;}
  .modhead .sub{color:var(--text-dim); font-size:14px; max-width:62ch; margin:0;}

  .tabs{display:flex; gap:6px; margin:20px 0 22px 0; border-bottom:1px solid var(--line);}
  .tab{font-family:var(--mono); font-size:12.5px; letter-spacing:.03em; padding:9px 14px; cursor:pointer; color:var(--text-dim); border-bottom:2px solid transparent; text-transform:uppercase;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--sky); border-bottom-color:var(--sky);}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:20px 22px; margin-bottom:14px; transition:transform .25s ease, border-color .25s ease;}
  .card:hover{transform:translateY(-2px); border-color:var(--sky);}
  .card h3{margin:18px 0 8px 0; font-size:14.5px; color:var(--sky); display:flex; align-items:center; gap:8px;}
  .card h3:first-child{margin-top:0;}
  .card p{margin:0 0 10px 0; font-size:14px; line-height:1.65;}
  .card ul, .card ol{margin:8px 0 12px 0; padding-left:18px;}
  .card li{font-size:13.5px; line-height:1.7; margin-bottom:5px;}

  .note{margin:12px 0; padding:11px 13px; background:rgba(56,189,248,.07); border-left:3px solid var(--sky); font-size:12.5px; color:var(--text-dim); border-radius:0 5px 5px 0;}
  .note.warn{background:rgba(248,113,113,.08); border-left-color:var(--red);}

  table.tech{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px; margin:6px 0 14px 0;}
  table.tech th, table.tech td{padding:7px 9px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top;}
  table.tech th{color:var(--sky); font-weight:600; background:var(--panel-raised);}
  table.tech td{color:var(--text-dim);}

  .fig{margin:14px 0 6px 0; text-align:center;}
  .fig img{width:100%; max-width:460px; display:block; margin:0 auto; border-radius:6px; border:1px solid var(--line); background:#f5f3ee;}
  .fig figcaption{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); margin-top:6px;}

  .placeholder{border:1px dashed var(--line); border-radius:8px; padding:16px; text-align:center; font-size:12px; color:var(--text-dim); margin:12px 0;}

  .cardsgrid{display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:14px; margin-top:6px;}
  .flash{perspective:1000px; height:130px; cursor:pointer;}
  .flash-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
  .flash.flipped .flash-inner{transform:rotateY(180deg);}
  .flash-face{position:absolute; inset:0; backface-visibility:hidden; border:1px solid var(--line); border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:12px;}
  .flash-front{background:var(--panel-raised);}
  .flash-front .acr{font-family:var(--mono); font-size:19px; color:var(--sky); font-weight:600;}
  .flash-front .hint{font-size:10px; color:var(--text-dim); margin-top:8px; text-transform:uppercase; letter-spacing:.05em;}
  .flash-back{background:var(--sky-dim); transform:rotateY(180deg);}
  .flash-back .full{font-size:12px; font-weight:600; margin-bottom:5px;}
  .flash-back .desc{font-size:11px; color:var(--text-dim); line-height:1.4;}

  .ovwgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; margin-top:10px;}
  .ovwcard{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px 18px; cursor:pointer; transition:transform .2s ease, border-color .2s ease;}
  .ovwcard:hover{border-color:var(--sky); transform:translateY(-3px);}
  .ovwcard .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .ovwcard .t-title{font-size:13.5px; font-weight:600;}
  .ovwcard .t-sub{font-size:12px; color:var(--text-dim); line-height:1.4;}
  .ovwcard .t-status{font-family:var(--mono); font-size:10.5px; text-transform:uppercase; color:var(--text-dim);}

  .barwrap{height:5px; background:var(--panel-raised); border-radius:3px; overflow:hidden; margin-top:16px;}
  .barfill{height:100%; background:linear-gradient(90deg, var(--sky), var(--emerald)); transition:width .4s;}

  .qcounter{font-family:var(--mono); font-size:12px; color:var(--text-dim); margin-bottom:10px;}
  .qcard{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:22px;}
  .qtext{font-size:15.5px; margin:0 0 18px 0; line-height:1.5;}
  .opt{display:flex; align-items:center; gap:10px; padding:11px 14px; border:1px solid var(--line); border-radius:6px; margin-bottom:9px; cursor:pointer; font-size:13.5px; background:var(--panel-raised); transition:transform .15s ease, border-color .15s ease;}
  .opt:hover{border-color:var(--sky); transform:translateX(3px);}
  .opt.correct{border-color:var(--emerald); background:rgba(52,211,153,.1);}
  .opt.wrong{border-color:var(--red); background:rgba(248,113,113,.1);}
  .opt .bullet{width:18px; height:18px; border-radius:50%; border:1px solid var(--text-dim); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:10px; color:var(--text-dim);}
  .opt.correct .bullet{border-color:var(--emerald); color:var(--emerald);}
  .opt.wrong .bullet{border-color:var(--red); color:var(--red);}

  .explain{margin-top:14px; padding:12px 14px; border-radius:6px; font-size:13px; line-height:1.55; background:var(--panel-raised); border:1px solid var(--line); display:none;}
  .explain.show{display:block;}

  .qnav{display:flex; justify-content:space-between; align-items:center; margin-top:20px;}
  .btn{font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.04em; background:var(--sky); color:#04222f; border:none; padding:10px 18px; border-radius:5px; cursor:pointer; font-weight:600; transition:transform .15s ease, background .2s ease;}
  .btn:hover{background:#67cffb; transform:translateY(-1px);}
  .btn.ghost{background:transparent; color:var(--text-dim); border:1px solid var(--line);}
  .btn.ghost:hover{color:var(--text); border-color:var(--sky);}
  .btn:disabled{opacity:.35; cursor:not-allowed;}

  .quizresult{text-align:center; padding:40px 20px;}
  .quizresult .score{font-family:var(--mono); font-size:50px; color:var(--sky); margin-bottom:6px;}
  .quizresult .label{color:var(--text-dim); font-size:12.5px; margin-bottom:22px;}

  .resetrow{margin-top:26px; padding-top:16px; border-top:1px solid var(--line);}
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-thumb{background:#3a4a5a; border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .flash:focus-visible{outline:2px solid var(--sky); outline-offset:2px;}

  @media print{
    .sidebar, .no-print, .themebtn, .resetrow{display:none !important;}
    body{background:#fff; color:#111;}
    .main{max-width:100%; padding:0;}
    .card{border:1px solid #999; break-inside:avoid; box-shadow:none;}
    table.tech th, table.tech td{color:#111; border-bottom:1px solid #999;}
    table.tech th{background:#eee;}
    .fig img{max-width:100%;}
  }
</style>
</head>

      Panel CDP312 · progreso guardado en este navegador

<script>
/* ============================================================
   HELPERS DE CONTENIDO
   ============================================================ */
const PLACEHOLDER = (txt) => `<div class="placeholder">🖼️ [Marcador de imagen: ${txt}]</div>`;
const NOTE = (txt) => `<div class="note warn">⚠️ ${txt}</div>`;
const INFO = (txt) => `<div class="note">💡 ${txt}</div>`;
const H3 = (txt) => `<h3><span style="width:6px;height:6px;border-radius:50%;background:var(--sky);display:inline-block;"></span>${txt}</h3>`;
const IMG = (src, caption, source) => `<figure class="fig">
  <img src="imagenes/${src}" alt="${caption}" loading="lazy">
  <figcaption>${caption}${source ? ` — <span style="font-style:italic">${source}</span>` : ''}</figcaption>
</figure>`;

/* ============================================================
   MÓDULOS
   ============================================================ */
const MODULES = [
{ id:'overview', title:'Panel general', short:'Inicio', isOverview:true },

{
  id:'seguridad', title:'Seguridad eléctrica y bloqueo', short:'Seguridad',
  eyebrow:'Módulo 01 · Seguridad', sub:'Riesgo del bus de CC, tiempos de descarga y bloqueo/etiquetado (LOTO).',
  content:`
    <div class="card">
      <p>Un variador de frecuencia no es un equipo pasivo: aunque se corte la alimentación de red, el <strong>banco de condensadores del bus de corriente continua (CC)</strong> almacena energía y puede mantener tensiones letales durante varios minutos. Este módulo cubre tanto el principio general de riesgo eléctrico en variadores como el procedimiento específico documentado por VACON para la familia NXP.</p>

      ${H3("Principio general: por qué el bus de CC sigue siendo peligroso")}
      <p>En cualquier variador de frecuencia, la etapa rectificadora carga un banco de condensadores que actúa como reserva de energía para alimentar la etapa inversora (IGBT) de forma estable. Estos condensadores tienen una capacitancia considerable y, al desconectar la red, se descargan lentamente a través de resistencias de sangrado internas — el tiempo de esta descarga depende del tamaño del equipo, por lo que <em>nunca</em> debe asumirse que un variador está "sin tensión" solo por haber apagado el interruptor principal.</p>

      ${H3("Procedimiento específico VACON NXP (según manual)")}
      <ul>
        <li><strong>Tiempo de espera obligatorio:</strong> tras desconectar la red, esperar <strong>5 minutos</strong> antes de abrir la tapa o puerta del gabinete — los terminales y componentes internos pueden seguir energizados durante ese período.</li>
        <li><strong>Bloqueo y etiquetado (LOTO):</strong> bloquear y etiquetar la fuente de energía; verificar que ninguna fuente externa (incluido el lado de carga/motor, que puede regenerar tensión si el eje gira) pueda generar tensión inesperada.</li>
        <li><strong>Puntos de medición de ausencia de tensión:</strong> terminales de motor <code>U, V, W</code>; terminales de resistencia de frenado; terminales del bus de CC (<code>B-, B+/R+, R-</code>). Los terminales de control también pueden portar tensión peligrosa aunque el variador esté desconectado de red.</li>
        <li><strong>Puesta a tierra:</strong> la corriente de fuga puede superar <strong>3.5 mA CA</strong> (según norma EN 61800-5-1), por lo que se exige conductor de tierra de protección reforzado. Uso obligatorio de <strong>RCD/RCM tipo B</strong> en el lado de red — un RCD tipo A o AC convencional no detecta correctamente las corrientes de fuga con componente de alta frecuencia que genera un variador.</li>
      </ul>

      ${NOTE("Los manuales VACON revisados no especifican umbrales numéricos exactos de tensión de bus CC (ej. &gt;540V/&gt;900V); el criterio documentado es cualitativo: \"tensión de bus CC superior a los límites permitidos\" (ver también código de falla F2 en el módulo de Diagnóstico). Verificar siempre con instrumento de medición categoría adecuada antes de tocar cualquier terminal de potencia — nunca confiar solo en el tiempo de espera.")}

      ${INFO("Buena práctica de terreno (conocimiento general, no cita textual del manual): documentar cada intervención con un permiso de trabajo eléctrico, verificar la tensión con un multímetro categoría III/IV en los tres puntos (antes de tocar, en el equipo, después del trabajo) y confirmar que el instrumento funciona antes y después de la medición.")}

      ${PLACEHOLDER("Etiqueta de bloqueo/tarjeta LOTO instalada en gabinete VACON NXP")}
    </div>
  `,
  quiz:[
    { q:"¿Cuánto tiempo mínimo se debe esperar tras desconectar la red antes de abrir el gabinete del VACON NXP?", options:["30 segundos","5 minutos","1 minuto","No es necesario esperar"], answer:1, explain:"El manual exige esperar 5 minutos tras desconectar la red antes de abrir el gabinete, ya que el bus de CC puede seguir energizado durante ese período." },
    { q:"¿Cuáles terminales deben verificarse como libres de tensión antes de una intervención?", options:["Solo U, V, W del motor","U, V, W, resistencia de frenado y terminales de bus CC (B-, B+/R+, R-)","Solo el terminal de tierra","Solo los terminales de control digital"], answer:1, explain:"El manual exige verificar U/V/W del motor, la resistencia de frenado y los terminales del bus CC antes de considerar el equipo libre de tensión." },
    { q:"Según el manual, ¿qué corriente de fuga obliga a usar conductor de tierra reforzado?", options:[">0.5 mA CA",">10 mA CA",">3.5 mA CA (EN 61800-5-1)","No se especifica ningún valor"], answer:2, explain:"La norma EN 61800-5-1 citada en el manual fija ese umbral de corriente de fuga como disparador de la exigencia de tierra reforzada." },
    { q:"¿Qué tipo de RCD/RCM es obligatorio en el lado de red según el manual, y por qué no sirve uno convencional?", options:["Tipo A, por costo","Tipo AC, es el estándar","Tipo B, porque detecta correctamente las corrientes de fuga de alta frecuencia del variador","No se requiere RCD"], answer:2, explain:"Un RCD tipo A o AC convencional no detecta bien las corrientes de fuga con componente de alta frecuencia que genera el variador; por eso se exige tipo B." },
    { q:"¿Por qué los terminales de control pueden ser peligrosos aunque el variador esté desconectado de la red?", options:["Nunca son peligrosos","Pueden portar tensión peligrosa por fuentes externas o remanente del bus CC","Solo son peligrosos si el motor está girando","Solo aplica a modelos NXS, no NXP"], answer:1, explain:"Fuentes externas conectadas a los terminales de control, o tensión remanente del bus CC, pueden mantenerlos energizados pese a la desconexión de red." }
  ]
},

{
  id:'arquitectura', title:'Arquitectura de potencia y modelos NXP', short:'Arquitectura',
  eyebrow:'Módulo 02 · Arquitectura', sub:'Clases de bastidor, flujo de potencia rectificador–bus CC–inversor y terminales.',
  content:`
    <div class="card">
      <p>El VACON NXP se fabrica en distintas clases de bastidor ("Frame", FR) según potencia y método de montaje. Conocer esta clasificación es clave para identificar accesorios compatibles, despejes de instalación y método de refrigeración en terreno.</p>

      ${H3("Clases de bastidor (según manual)")}
      <table class="tech">
        <tr><th>Clase</th><th>Montaje</th><th>Protección</th></tr>
        <tr><td>FR4–FR9</td><td>Pared / brida</td><td>IP00 / IP21 (UL Type 1) / IP54 (UL Type 12)</td></tr>
        <tr><td>FR10–FR11</td><td>Autoportante (free-standing)</td><td>IP00 / IP21 / IP54</td></tr>
      </table>
      ${NOTE("Todas las variantes documentadas en los manuales revisados son de <strong>refrigeración por aire</strong>. No se documenta una variante de refrigeración líquida para esta familia — no asumir su existencia sin verificar la placa de tipo del equipo físico.")}

      ${H3("Principio general del flujo de potencia en un VFD")}
      <p>Todo variador de frecuencia de tipo PWM sigue la misma arquitectura conceptual de tres etapas: una etapa rectificadora convierte la CA de red en CC pulsante, un banco de condensadores del bus intermedio la filtra y estabiliza, y una etapa inversora de transistores IGBT la trocea en pulsos de ancho variable (PWM) que, promediados por la inductancia del motor, reconstruyen una onda de tensión/frecuencia variable. Este principio es el mismo en cualquier fabricante; lo que cambia es la implementación de protección, filtrado y control.</p>

      ${H3("Implementación específica VACON NXP (según manual)")}
      <ul>
        <li><strong>Flujo de potencia:</strong> puente rectificador de entrada (6 pulsos, no controlado) → bus de corriente continua intermedio → banco de condensadores de filtrado → etapa inversora con módulos IGBT que generan la salida PWM al motor.</li>
        <li><strong>Terminales de bus CC:</strong> <code>B- / B+</code> (conexión de bus CC externo, opcional en FR8 y mayores) y <code>R+ / R-</code> (resistencia de frenado externa).</li>
        <li>FR4–FR9/FR10 tienen una entrada/una salida; FR11 tiene dos entradas/una salida (excepto tipos 0460/0502, con una sola entrada).</li>
      </ul>
      ${INFO("Contexto general: la función del banco de condensadores no es solo filtrar — también desacopla al inversor de las variaciones instantáneas de la red, permitiendo que el motor siga girando (\"ride-through\") durante caídas breves de tensión. Un bus de CC compartido entre varios variadores (mediante B-/B+) permite regenerar energía de frenado de un eje hacia otro que esté motorizando, reduciendo el uso de resistencias de frenado.")}

      ${IMG("flujo-potencia-fr4-fr11.png", "Topología de tamaños de carcasa FR4-FR11: rectificador → bus CC → inversor", "Vacon-NXS-NXP-User-Manual-DPD01220F-ES, Imag. 21, p.55")}
    </div>

    <div class="card">
      ${H3("Rango de potencia por tensión de red y refrigeración (capacitación interna Vacon NXP)")}
      <table class="tech">
        <tr><th>Refrigeración</th><th>Tensión de red</th><th>Rango de potencia</th></tr>
        <tr><td>Aire</td><td>208-240 V</td><td>0,55-90 kW</td></tr>
        <tr><td>Aire</td><td>380-500 V</td><td>1,5-1200 kW (hasta 4000 kW con DriveSynch)</td></tr>
        <tr><td>Aire</td><td>525-690 V</td><td>2,0-2000 kW (hasta 4500 kW con DriveSynch)</td></tr>
        <tr><td>Líquido</td><td>400-500 V</td><td>132-4100 kW</td></tr>
        <tr><td>Líquido</td><td>525-690 V</td><td>110-5300 kW</td></tr>
      </table>
      ${NOTE("Esta tabla proviene de una capacitación interna complementaria (\"Vacon NXP\", diapositiva 1) y sí documenta una variante de <strong>refrigeración líquida</strong> para potencias altas — a diferencia de los manuales de hardware de tarjetas revisados en el resto de este módulo, que solo cubren variantes de aire. Confirmar siempre el método de refrigeración contra la placa de tipo física del equipo antes de asumir uno u otro.")}

      ${H3("Principio de funcionamiento mecanístico (capacitación interna Vacon NXP)")}
      <ul>
        <li>El variador consta mecánicamente de dos unidades: la <strong>unidad de potencia</strong> y la <strong>unidad de control</strong>.</li>
        <li>La bobina de CA trifásica en el extremo de red, junto con el condensador de enlace de CC, forman un filtro LC que, junto al puente de diodos, produce la alimentación de tensión continua al puente inversor IGBT.</li>
        <li>La bobina de CA también filtra perturbaciones de alta frecuencia de la red (y las que genera el propio variador) y mejora la forma de onda de la corriente de entrada.</li>
        <li>El puente inversor IGBT produce la tensión alterna modulada PWM trifásica simétrica que alimenta al motor.</li>
        <li>El bloque de control de motor y aplicación se basa en un microprocesador, que controla el motor según mediciones, ajustes de parámetros, E/S de control y teclado. Este bloque se comunica con la <strong>tarjeta ASIC de control del motor</strong>, que calcula las posiciones de conmutación de los IGBT; los <strong>controladores de compuerta (gate drivers)</strong> amplifican esas señales para accionar físicamente el puente inversor.</li>
      </ul>

      ${H3("Unidad de control y alimentación externa 24V (capacitación interna Vacon NXP)")}
      <p>La unidad de control se compone de la tarjeta de control más las tarjetas adicionales conectadas a los cinco conectores A-E (ver módulo de Tarjetas de control). La tarjeta de control se conecta a la unidad de potencia mediante un conector D o cables de fibra óptica.</p>
      ${INFO("Puede alimentarse externamente con +24V ±10% conectando una fuente externa a cualquiera de los terminales bidireccionales <strong>nº6 o nº12</strong>. Esta tensión es suficiente para ajustar parámetros y mantener activo el fieldbus <em>sin</em> tener conectada la alimentación de potencia principal — útil para revisar/editar configuración en un equipo que aún no está energizado en potencia.")}
    </div>
  `,

    { q:"¿Cuál es el orden correcto del flujo de potencia en un VACON NXP?", options:["Inversor IGBT → bus CC → rectificador","Rectificador de entrada → bus CC → banco de condensadores → inversor IGBT","Bus CC → rectificador → motor","Motor → inversor → rectificador"], answer:1, explain:"El flujo sigue: rectificador de entrada, bus CC intermedio, banco de condensadores de filtrado y finalmente la etapa inversora IGBT." },
    { q:"¿Qué terminales corresponden a la conexión del bus de CC externo?", options:["U, V, W","B- / B+","R+ / R-","DIN1 / DIN2"], answer:1, explain:"B-/B+ son los terminales de conexión del bus de CC externo, opcionales en FR8 y mayores." },
    { q:"¿En qué terminales de la tarjeta de control puede conectarse una fuente de alimentación externa de 24V para mantener el fieldbus activo sin potencia principal?", options:["Terminal nº6 o nº12","Solo terminal nº1","B+/B-","R+/R-"], answer:0, explain:"Según la capacitación interna Vacon NXP, la unidad de control acepta 24V±10% externos en cualquiera de los terminales bidireccionales nº6 o nº12." },
    { q:"¿Qué función cumple la tarjeta ASIC de control del motor dentro del bloque de control?", options:["Filtra la red eléctrica","Calcula las posiciones de conmutación de los IGBT a partir de la información del microprocesador","Almacena el historial de fallas","Regula la tensión de red de entrada"], answer:1, explain:"El microprocesador se comunica con la tarjeta ASIC de control del motor, que calcula las posiciones de los IGBT; los gate drivers amplifican esas señales para accionar el inversor." }
  ]

{

{

  content:`

    { q:"En la Status Word, ¿qué indica el bit b2?", options:["Falla","En marcha (Running)","Advertencia","Freno CC activo"], answer:1, explain:"El bit b2 de la Status Word indica que el variador está en marcha (Running)." },
