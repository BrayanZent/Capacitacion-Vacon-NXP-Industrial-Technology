<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Capacitación · Industrial Technology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f1620;
    --panel: #16202c;
    --panel-raised: #1e2a38;
    --line: #2b3a4a;
    --text: #e6edf5;
    --text-dim: #8fa0b3;
    --sky: #38bdf8;
    --sky-dim: #163244;
    --emerald: #34d399;
    --emerald-dim: #14332a;
    --red: #f87171;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  :root.light-theme{
    --bg: #f3f6fa;
    --panel: #ffffff;
    --panel-raised: #eef2f7;
    --line: #d7e0ea;
    --text: #1b2530;
    --text-dim: #5c6b7d;
    --sky-dim: #e0f2fe;
    --emerald-dim: #d4f5e4;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  ::selection{background:var(--sky-dim);color:var(--text);}

  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes logoIn{ from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);} }
  .reveal{opacity:0; transform:translateY(18px); transition:opacity .55s cubic-bezier(.2,.7,.3,1), transform .55s cubic-bezier(.2,.7,.3,1);}
  .reveal.in{opacity:1; transform:translateY(0);}

  .wrap{max-width:980px; margin:0 auto; padding:56px 24px 80px 24px; animation:fadeIn .5s ease;}

  .topbar{display:flex; justify-content:flex-end; margin-bottom:18px;}
  .themebtn{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.04em; background:transparent; color:var(--text-dim); border:1px solid var(--line); padding:8px 14px; border-radius:6px; cursor:pointer;}
  .themebtn:hover{color:var(--text); border-color:var(--sky);}

  .hero{text-align:center; margin-bottom:48px;}
  .hero-logo{width:170px; display:block; margin:0 auto 22px auto; background:#fff; border-radius:8px; padding:10px 14px; animation:logoIn .8s cubic-bezier(.2,.8,.3,1);}
  .hero .tag{font-family:var(--mono); font-size:11.5px; letter-spacing:.14em; color:var(--emerald); text-transform:uppercase; margin-bottom:10px;}
  .hero h1{font-size:32px; margin:0 0 10px 0; line-height:1.2;}
  .hero p{color:var(--text-dim); font-size:14.5px; max-width:56ch; margin:0 auto;}

  .section-label{font-family:var(--mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--sky); margin:0 0 14px 4px;}

  .traingrid{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px; margin-bottom:40px;}
  .traincard{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:22px 24px; cursor:pointer; text-decoration:none; color:var(--text); display:block; transition:transform .2s ease, border-color .2s ease;}
  .traincard:hover{border-color:var(--sky); transform:translateY(-3px);}
  .traincard .top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;}
  .traincard .icon{width:38px; height:38px; border-radius:8px; background:var(--sky-dim); color:var(--sky); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .traincard .badge{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--emerald); border:1px solid var(--emerald); border-radius:4px; padding:3px 7px; height:fit-content;}
  .traincard h3{font-size:16.5px; margin:4px 0 6px 0;}
  .traincard .meta{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:10px;}
  .traincard p{font-size:13px; color:var(--text-dim); line-height:1.6; margin:0;}
  .traincard .cta{margin-top:14px; font-family:var(--mono); font-size:11px; color:var(--sky); text-transform:uppercase; letter-spacing:.04em;}

  .placeholder-card{border:1px dashed var(--line); border-radius:10px; padding:22px 24px; color:var(--text-dim); font-size:13px; display:flex; align-items:center; justify-content:center; text-align:center; min-height:150px;}

  .foot{text-align:center; font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:40px; padding-top:20px; border-top:1px solid var(--line);}

  @media (max-width:600px){ .wrap{padding:32px 16px 60px 16px;} .hero h1{font-size:26px;} }
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <button class="themebtn" id="themeToggle">🌓 Cambiar tema</button>
  </div>

  <div class="hero reveal">
    <img class="hero-logo" src="Logo empresa.png" alt="Logo de la empresa">
    <div class="tag">Centro de capacitación</div>
    <h1>Industrial Technology</h1>
    <p>Selecciona una capacitación para comenzar. Tu progreso se guarda automáticamente en este navegador, módulo por módulo.</p>
  </div>

  <p class="section-label reveal">Capacitaciones disponibles</p>
  <div class="traingrid" id="traingrid"></div>

  <div class="foot reveal">Nuevas capacitaciones se agregarán a este panel próximamente.</div>
</div>

<script>
/* ============================================================
   CATÁLOGO DE CAPACITACIONES
   Para agregar una nueva capacitación en el futuro, sumar un
   objeto a este array — no hace falta tocar el resto del archivo.
   ============================================================ */
const TRAININGS = [
  {
    id: 'vacon-nxp',
    icon: '⚙️',
    title: 'VACON NXP',
    meta: '12 módulos · Variadores de frecuencia',
    desc: 'Arquitectura de potencia, tarjetas de control, redes de comunicación, programación NCDrive, puesta en marcha, diagnóstico de fallas y mantenimiento.',
    href: 'capacitaciones/vacon-nxp/index.html',
    badge: 'Disponible'
  }
];

const THEME_KEY = 'capacitacion-theme';
function applyTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  if(saved === 'light'){ document.documentElement.classList.add('light-theme'); }
  else { document.documentElement.classList.remove('light-theme'); }
}
applyTheme();
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const isLight = document.documentElement.classList.toggle('light-theme');
  localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
});

function renderTrainings(){
  const grid = document.getElementById('traingrid');
  grid.innerHTML = TRAININGS.map(t => `
    <a class="traincard reveal" href="${t.href}">
      <div class="top">
        <div class="icon">${t.icon}</div>
        <span class="badge">${t.badge}</span>
      </div>
      <h3>${t.title}</h3>
      <div class="meta">${t.meta}</div>
      <p>${t.desc}</p>
      <div class="cta">Ingresar →</div>
    </a>
  `).join('');
}
renderTrainings();

const items = document.querySelectorAll('.reveal');
items.forEach((el,i)=>{ el.style.transitionDelay = Math.min(i*70,420)+'ms'; });
requestAnimationFrame(()=>requestAnimationFrame(()=>{ items.forEach(el=>el.classList.add('in')); }));
</script>
</body>
</html>
